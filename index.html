<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Website của tôi</title>
    <style>

            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {

            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {

        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }

<body>

<nav>

</nav>

<div class="container">
    <div class="card">
        <h2>👨‍💻 Thông tin cá nhân</h2>
        <p>Tên: Tranquanhy</p>
        <p>Sinh viên CNTT</p>
    </div>

    <div class="card">
        <h2>📚 Sở thích</h2>
        <p>Lập trình, chơi game, nghe truyện</p>
    </div>

<footer>

</html>
